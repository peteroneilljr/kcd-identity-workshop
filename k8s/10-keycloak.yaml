apiVersion: v1
kind: Service
metadata:
  name: keycloak
  namespace: ams-demo
spec:
  selector:
    app: keycloak
  ports:
    - name: http
      port: 8180
      targetPort: 8180
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: ams-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:23.0
          args: ["start-dev", "--import-realm"]
          env:
            - name: KEYCLOAK_ADMIN
              value: admin
            - name: KEYCLOAK_ADMIN_PASSWORD
              value: admin
            - name: KC_HTTP_PORT
              value: "8180"
            # Pin frontend URL so JWT iss is deterministic and matches the
            # issuer Envoy expects, regardless of which Host header reaches
            # Keycloak (port-forward, in-cluster, etc.).
            - name: KC_HOSTNAME_URL
              value: "http://localhost:8180"
            - name: KC_HOSTNAME_STRICT_BACKCHANNEL
              value: "false"
          ports:
            - name: http
              containerPort: 8180
          volumeMounts:
            - name: realm-import
              mountPath: /opt/keycloak/data/import
              readOnly: true
          readinessProbe:
            httpGet:
              path: /realms/demo
              port: 8180
            initialDelaySeconds: 20
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 60
          livenessProbe:
            tcpSocket:
              port: 8180
            initialDelaySeconds: 60
            periodSeconds: 15
      volumes:
        - name: realm-import
          configMap:
            name: keycloak-realm
            items:
              - key: realm.json
                path: realm.json
