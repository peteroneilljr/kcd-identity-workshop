apiVersion: v1
kind: Service
metadata:
  name: sshd
  namespace: ams-demo
spec:
  selector:
    app: sshd
  ports:
    - name: ssh
      port: 22
      targetPort: 22
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sshd
  namespace: ams-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sshd
  template:
    metadata:
      labels:
        app: sshd
    spec:
      containers:
        - name: sshd
          image: ghcr.io/peteroneilljr/kcd-identity-workshop/demo-sshd:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 22
          volumeMounts:
            # CA pubkey baked in at runtime — sshd's TrustedUserCAKeys references this path.
            - name: ca-pub
              mountPath: /etc/ssh/ca.pub
              subPath: ca.pub
              readOnly: true
            # Host keys live in an emptyDir; ssh-keygen -A regenerates on pod start.
            - name: host-keys
              mountPath: /etc/ssh/host-keys
          readinessProbe:
            tcpSocket:
              port: 22
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 22
            initialDelaySeconds: 10
            periodSeconds: 15
      volumes:
        - name: ca-pub
          configMap:
            name: ssh-ca-pub
        - name: host-keys
          emptyDir: {}
