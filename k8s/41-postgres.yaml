apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: ams-demo
type: Opaque
stringData:
  POSTGRES_PASSWORD: "postgres"
  PGUSER: "dbproxy"
  PGPASSWORD: "dbproxy"
  PGDATABASE: "demo"
  PGHOST: "postgres"
  PGPORT: "5432"
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: ams-demo
spec:
  selector:
    app: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: ams-demo
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: demo-postgres:k8s
          imagePullPolicy: IfNotPresent
          # Logging and audit settings:
          #   shared_preload_libraries=pgaudit  — load the pgaudit lib at startup
          #     so the CREATE EXTENSION pgaudit in init.sql can attach hooks.
          #   pgaudit.log=read,write,role,ddl   — emit AUDIT lines for each
          #     class of statement: SELECT/COPY (read), INSERT/UPDATE/DELETE
          #     (write), GRANT/REVOKE/CREATE-ROLE (role), DDL (schema).
          #   log_connections=on                 — record session-establishment
          #     for every connection (visible login user = dbproxy).
          #   log_statement=all                  — Postgres-native "log every
          #     statement" — coarser than pgaudit but useful for comparison.
          #   log_line_prefix                    — prepend timestamp + role +
          #     pid so log lines parse cleanly in Loki.
          args:
            - "postgres"
            - "-c"
            - "shared_preload_libraries=pgaudit"
            - "-c"
            - "pgaudit.log=read,write,role,ddl"
            - "-c"
            - "log_connections=on"
            - "-c"
            - "log_statement=all"
            - "-c"
            - "log_line_prefix=%m [%p] %q%u@%d "
          env:
            - name: POSTGRES_DB
              value: demo
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_PASSWORD
            # initdb scripts in /docker-entrypoint-initdb.d only run if
            # PGDATA is empty — emptyDir gives that on every pod restart,
            # which is exactly what a demo wants.
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - name: postgres
              containerPort: 5432
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init-sql
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres", "-d", "demo"]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres", "-d", "demo"]
            initialDelaySeconds: 30
            periodSeconds: 15
      volumes:
        - name: data
          emptyDir: {}
        - name: init-sql
          configMap:
            name: postgres-init
