apiVersion: v1
kind: Service
metadata:
  name: public-app
  namespace: ams-demo
spec:
  selector:
    app: public-app
  ports:
    - name: http
      port: 3000
      targetPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: public-app
  namespace: ams-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: public-app
  template:
    metadata:
      labels:
        app: public-app
    spec:
      containers:
        - name: public-app
          image: demo-public-app:k8s
          imagePullPolicy: IfNotPresent
          env:
            - name: SERVICE_NAME
              value: public-app
            - name: PORT
              value: "3000"
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15
---
