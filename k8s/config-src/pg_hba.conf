# Postgres host-based auth. Loaded via -c hba_file=. Three categories:
#
#   1. local socket — trust (used by initdb and pg_isready)
#   2. dbproxy from anywhere — scram-sha-256 (existing db-app flow)
#   3. demo db over TLS, any user, with valid client cert — `cert` auth.
#      The cert's CN must equal the requested DB user. Cert chain is verified
#      against ssl_ca_file (the pg-ca CA cert).
#
# Order matters: rules are evaluated top-to-bottom. dbproxy matches rule 2
# before reaching rule 3, so it never needs a cert.

# TYPE    DATABASE    USER          ADDRESS         METHOD
local     all         all                           trust
host      all         postgres      0.0.0.0/0       scram-sha-256
host      all         dbproxy       0.0.0.0/0       scram-sha-256
host      all         dbproxy       ::/0            scram-sha-256

# Cert auth for any user connecting to the demo database over TLS. The
# `cert` method requires clientcert verification (against ssl_ca_file)
# AND the cert's CN to equal the requested DB user. So a cert with
# CN=alice can only connect as user=alice.
hostssl   demo        all           0.0.0.0/0       cert
hostssl   demo        all           ::/0            cert

# Anything else is rejected.
host      all         all           0.0.0.0/0       reject
host      all         all           ::/0            reject
