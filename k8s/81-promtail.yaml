apiVersion: v1
kind: ServiceAccount
metadata:
  name: promtail
  namespace: ams-demo
---
# Promtail uses kubernetes_sd_configs to auto-discover pods, which needs
# read access to pods/namespaces cluster-wide.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: promtail-ams-demo
rules:
  - apiGroups: [""]
    resources: ["pods", "namespaces", "nodes"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: promtail-ams-demo
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: promtail-ams-demo
subjects:
  - kind: ServiceAccount
    name: promtail
    namespace: ams-demo
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: ams-demo
data:
  promtail.yaml: |
    server:
      http_listen_port: 9080
      grpc_listen_port: 0
      log_level: warn
    positions:
      filename: /run/promtail/positions.yaml
    clients:
      - url: http://loki:3100/loki/api/v1/push
    scrape_configs:
      - job_name: ams-demo-pods
        # CRI parses the standard kubelet log format ("<timestamp> <stream> <log>")
        # into a clean message; without this stage the timestamps double up.
        pipeline_stages:
          - cri: {}
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          # Only scrape ams-demo. (Promtail still reads everything; this filter
          # discards before sending to Loki.)
          - action: keep
            source_labels: [__meta_kubernetes_namespace]
            regex: ams-demo
          - source_labels: [__meta_kubernetes_pod_label_app]
            target_label: app
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_pod_container_name]
            target_label: container
          # Map to the actual log file path on the node:
          #   /var/log/pods/<ns>_<pod>_<uid>/<container>/*.log
          - action: replace
            replacement: /var/log/pods/*$1/*.log
            separator: /
            source_labels:
              - __meta_kubernetes_pod_uid
              - __meta_kubernetes_pod_container_name
            target_label: __path__
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: promtail
  namespace: ams-demo
spec:
  selector:
    matchLabels:
      app: promtail
  template:
    metadata:
      labels:
        app: promtail
    spec:
      serviceAccountName: promtail
      tolerations:
        - effect: NoSchedule
          operator: Exists
      containers:
        - name: promtail
          image: ghcr.io/peteroneilljr/kcd-identity-workshop/promtail:3.2.0
          args:
            - "-config.file=/etc/promtail/promtail.yaml"
          ports:
            - name: http
              containerPort: 9080
          env:
            - name: HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          volumeMounts:
            - name: config
              mountPath: /etc/promtail
              readOnly: true
            - name: positions
              mountPath: /run/promtail
            - name: varlog
              mountPath: /var/log
              readOnly: true
            - name: varlibpods
              mountPath: /var/lib/docker/containers
              readOnly: true
          # Promtail needs to read root-owned pod log files from the host.
          securityContext:
            runAsUser: 0
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
              add: ["DAC_READ_SEARCH"]
          readinessProbe:
            httpGet:
              path: /ready
              port: 9080
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: promtail-config
        - name: positions
          emptyDir: {}
        - name: varlog
          hostPath:
            path: /var/log
        - name: varlibpods
          hostPath:
            path: /var/lib/docker/containers
