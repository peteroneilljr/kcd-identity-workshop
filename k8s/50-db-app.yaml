apiVersion: v1
kind: Service
metadata:
  name: db-app
  namespace: ams-demo
spec:
  selector:
    app: db-app
  ports:
    - name: http
      port: 3003
      targetPort: 3003
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: db-app
  namespace: ams-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: db-app
  template:
    metadata:
      labels:
        app: db-app
    spec:
      containers:
        - name: db-app
          image: demo-db-app:k8s
          imagePullPolicy: IfNotPresent
          env:
            - name: SERVICE_NAME
              value: db-app
            - name: PORT
              value: "3003"
          envFrom:
            - secretRef:
                name: postgres-credentials
          ports:
            - containerPort: 3003
          readinessProbe:
            httpGet:
              path: /health
              port: 3003
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /health
              port: 3003
            initialDelaySeconds: 15
            periodSeconds: 15
