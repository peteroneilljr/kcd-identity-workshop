<text x="260.0" y="391.9" font-size="14" fill="#15803d" text-anchor="middle" opacity="1.0">Shape every backend follows:</text>
<text x="260.0" y="409.4" font-size="14" fill="#15803d" text-anchor="middle" opacity="1.0">  federated identity at edge</text>
<text x="260.0" y="426.9" font-size="14" fill="#15803d" text-anchor="middle" opacity="1.0">+ short-lived native credential at resource</text>
<text x="160.0" y="493.6" font-size="16" fill="#1e1e1e" text-anchor="middle" opacity="1.0">Three prerequisites</text>
<text x="210.0" y="516.05" font-size="13" fill="#1e1e1e" text-anchor="middle" opacity="1.0">1. Verifiable identity at the resource</text>
<text x="210.0" y="536.05" font-size="13" fill="#1e1e1e" text-anchor="middle" opacity="1.0">2. Resource authz honors that identity</text>
<text x="220.0" y="556.05" font-size="13" fill="#1e1e1e" text-anchor="middle" opacity="1.0">3. Credentials at the resource are short-lived</text>
</svg>