<text x="670.0" y="128.15" font-size="14" fill="#1e1e1e" text-anchor="middle">A. Native OIDC -&gt; Grafana</text>
<rect x="560" y="200" width="220" height="110" rx="8" ry="8" fill="#d0bfff" stroke="#8b5cf6" stroke-width="2" opacity="1.0"/>
<text x="670.0" y="258.15" font-size="14" fill="#1e1e1e" text-anchor="middle">B. JWT -&gt; 15m SSH cert</text>
<rect x="560" y="330" width="220" height="110" rx="8" ry="8" fill="#ffd8a8" stroke="#f59e0b" stroke-width="2" opacity="1.0"/>
<text x="670.0" y="388.15" font-size="14" fill="#1e1e1e" text-anchor="middle">C. Bearer gateway (Envoy)</text>
