# Mirrors the upstream images this demo pulls at apply-time into GHCR, so
# workshop attendees don't hit Docker Hub anonymous-pull rate limits and so
# the cluster has a single network destination for image pulls.
#
# Locally-built images (demo-public-app, demo-alice-app, etc.) are NOT
# mirrored — they're built per-machine via `docker build`, since iterating
# on those during the workshop shouldn't require pushing to a registry.
#
# After the first run, the GHCR packages will be private. Make them public
# (one-time, manual) at:
#   https://github.com/peteroneilljr?tab=packages&repo_name=kcd-identity-workshop
# or via API:
#   gh api -X PATCH /user/packages/container/<name>/visibility -f visibility=public
name: mirror upstream images

on:
  workflow_dispatch:
  schedule:
    # Weekly refresh — picks up new patch versions of rolling tags
    # (e.g. envoyproxy/envoy:v1.28-latest).
    - cron: "0 6 * * 1"
  push:
    branches: [main]
    paths:
      - ".github/workflows/mirror-images.yml"

permissions:
  packages: write
  contents: read

jobs:
  mirror:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - upstream: "alpine:3.20"
            name: "alpine"
            tag: "3.20"
          - upstream: "postgres:16-alpine"
            name: "postgres"
            tag: "16-alpine"
          - upstream: "grafana/grafana:11.2.0"
            name: "grafana"
            tag: "11.2.0"
          - upstream: "envoyproxy/envoy:v1.28-latest"
            name: "envoy"
            tag: "v1.28-latest"
          - upstream: "quay.io/keycloak/keycloak:23.0"
            name: "keycloak"
            tag: "23.0"

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Mirror ${{ matrix.upstream }}
        env:
          UPSTREAM: ${{ matrix.upstream }}
          DEST: ghcr.io/${{ github.repository }}/${{ matrix.name }}:${{ matrix.tag }}
        run: |
          # `docker buildx imagetools create` copies the entire manifest list
          # (multi-arch) without re-pulling each platform's layers locally.
          # This matters because workshop attendees may be on linux/amd64
          # (Intel laptops, runners) or linux/arm64 (Apple Silicon).
          docker buildx imagetools create --tag "$DEST" "$UPSTREAM"
          echo "mirrored: $UPSTREAM -> $DEST"
